<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rhythm Runner</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    background: #79dcf5;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "Segoe UI", "Arial Rounded MT Bold", Arial, sans-serif;
  }
  canvas { display: block; position: fixed; inset: 0; }

  #splash {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(#79dcf5 0%, #a9ecf7 55%, #ffe7c4 100%);
    text-align: center;
  }
  #ttl { line-height: 0.95; margin-bottom: 18px; }
  #ttl span {
    display: inline-block;
    font-weight: 900;
    font-size: clamp(44px, 11vmin, 96px);
    letter-spacing: 0.02em;
    text-shadow: 0 4px 0 rgba(0,0,0,0.12);
    animation: hop 1.5s ease-in-out infinite;
  }
  @keyframes hop {
    0%, 55%, 100% { transform: translateY(0) rotate(0deg); }
    22% { transform: translateY(-16px) rotate(-4deg); }
    38% { transform: translateY(0) rotate(2deg); }
  }
  #splash .sub {
    font-size: clamp(16px, 2.6vmin, 22px);
    font-weight: 700; color: #2c5a6b;
    margin: 0 24px 30px;
    line-height: 1.5;
  }
  #play {
    font-size: clamp(22px, 3.6vmin, 32px);
    font-weight: 900; color: #fff;
    background: linear-gradient(#ff9b54, #ff7043);
    border-radius: 999px;
    padding: 18px 42px;
    box-shadow: 0 6px 0 #d1552f, 0 10px 22px rgba(0,0,0,0.18);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 50% { transform: scale(1.07); } }

  #pauseBtn {
    position: fixed; z-index: 9;
    top: calc(env(safe-area-inset-top, 0px) + 10px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    width: 58px; height: 58px;
    border: none; border-radius: 18px;
    background: rgba(255,255,255,0.85);
    color: #2c5a6b; font-size: 22px; font-weight: 900;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  #menu {
    position: fixed; inset: 0; z-index: 11;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20, 50, 70, 0.45);
    backdrop-filter: blur(3px);
  }
  #menu .card {
    background: #fff; border-radius: 28px;
    padding: 28px 30px; min-width: 260px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    text-align: center;
  }
  #menu h2 { margin: 0 0 18px; color: #2c5a6b; font-size: 30px; font-weight: 900; }
  #menu button {
    display: block; width: 100%;
    margin: 10px 0; padding: 16px;
    font-size: 20px; font-weight: 800;
    border: none; border-radius: 16px;
    color: #fff; background: #58a6ff;
    box-shadow: 0 4px 0 #3b7fd4;
  }
  #menu button:active { transform: translateY(2px); box-shadow: 0 2px 0 #3b7fd4; }
  #menu #restartB { background: #ff9b54; box-shadow: 0 4px 0 #d1552f; }
  #menu #soundB  { background: #62ce7a; box-shadow: 0 4px 0 #3f9e58; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<button id="pauseBtn" hidden>&#10074;&#10074;</button>

<div id="splash">
  <div id="ttl"></div>
  <div class="sub">Bop the dino runs to the beat!<br>Tap anywhere to jump over the grumps and grab the stars.</div>
  <div id="play">&#9654;&nbsp; TAP TO PLAY</div>
</div>

<div id="menu" hidden>
  <div class="card">
    <h2>Paused</h2>
    <button id="resumeB">&#9654; Keep playing</button>
    <button id="restartB">&#8634; Start over</button>
    <button id="soundB">&#128266; Sound is on</button>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
   RHYTHM RUNNER — a beat-synced side-scroller for small hands
   ---------------------------------------------------------------------
   Everything on screen is positioned off the Web Audio clock:
       x = playerX + SPEED * (event.targetTime - audioCtx.currentTime)
   so obstacles and stars arrive at the player EXACTLY on the beat and
   visuals can never drift from the music. Pausing simply suspends the
   AudioContext, which freezes the whole world.
   ===================================================================== */

/* ---------------- canvas ---------------- */
const cv  = document.getElementById('game');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

/* ---------------- music constants ---------------- */
const BPM        = 112;
const STEP       = 60 / BPM / 4;      // one 16th note, in seconds
const BEAT       = STEP * 4;
const LOOP_STEPS = 128;               // 8 bars
const LOOP_DUR   = STEP * LOOP_STEPS;

/* ---------------- physics ---------------- */
const GRAV = 2300;                    // px / s^2
const JV   = 830;                     // jump velocity, px / s (up positive)
const APEX = JV * JV / (2 * GRAV);    // ~150 px
const PR   = 26;                      // player radius

/* ---------------- layout (recomputed on resize) ---------------- */
let SPEED = 340, PX = 180, groundY = 0, spawnHorizon = 3;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  SPEED = Math.max(300, Math.min(W * 0.30, 470));
  PX    = Math.max(110, Math.min(W * 0.20, 260));
  groundY = H - Math.max(84, H * 0.15);
  spawnHorizon = (W - PX + 120) / SPEED + 0.4;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function () { setTimeout(resize, 120); });
resize();

/* =====================================================================
   AUDIO ENGINE — created lazily inside the first user gesture (iOS rule)
   ===================================================================== */
let actx = null, master, musicG, sfxG, melBus, noiseBuf;

function initAudio() {
  if (actx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  actx = new AC();

  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 6;
  comp.connect(actx.destination);

  master = actx.createGain(); master.gain.value = 0.9; master.connect(comp);
  musicG = actx.createGain(); musicG.gain.value = 0.9; musicG.connect(master);
  sfxG   = actx.createGain(); sfxG.gain.value   = 1.0; sfxG.connect(master);

  // melody bus: gentle lowpass (soft square) + beat-synced echo sparkle
  melBus = actx.createGain(); melBus.gain.value = 1;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2600;
  melBus.connect(lp); lp.connect(musicG);
  const send = actx.createGain(); send.gain.value = 0.45;
  const dly  = actx.createDelay(1); dly.delayTime.value = STEP * 3;
  const fb   = actx.createGain(); fb.gain.value = 0.33;
  const wet  = actx.createGain(); wet.gain.value = 0.35;
  melBus.connect(send); send.connect(dly);
  dly.connect(fb); fb.connect(dly);
  dly.connect(wet); wet.connect(musicG);

  // one second of white noise, reused for drums
  noiseBuf = actx.createBuffer(1, actx.sampleRate, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}

function mf(m) { return 440 * Math.pow(2, (m - 69) / 12); }   // midi -> Hz

function tone(freq, t, dur, type, vol, dest) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t + dur + 0.08);
}

function noiseHit(t, dur, vol, filtType, filtFreq, dest) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = filtType; f.frequency.value = filtFreq;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  s.connect(f); f.connect(g); g.connect(dest);
  s.start(t); s.stop(t + dur + 0.05);
}

/* drums */
function kick(t) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  g.gain.setValueAtTime(0.55, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
  o.connect(g); g.connect(musicG);
  o.start(t); o.stop(t + 0.2);
}
function clap(t) { noiseHit(t, 0.08, 0.30, 'bandpass', 1700, musicG); }
function hat(t, v) { noiseHit(t, 0.035, v, 'highpass', 6800, musicG); }

/* ---------------- the song: 8 bars, C / Am / F / G ---------------- */
/* melody per bar: [step, midi, length-in-16ths] */
const MEL = [
  [[0,76,2],[2,79,2],[4,81,3],[8,79,2],[10,76,2],[12,74,4]],
  [[0,72,2],[2,74,2],[4,76,3],[8,79,2],[10,81,2],[12,79,4]],
  [[0,81,2],[2,79,2],[4,76,2],[6,79,2],[8,81,3],[12,84,4]],
  [[0,83,2],[2,81,2],[4,79,3],[8,74,2],[10,76,2],[12,79,3]],
  [[0,84,2],[2,81,2],[4,79,3],[8,76,2],[10,79,2],[12,81,4]],
  [[0,79,2],[2,76,2],[4,74,3],[8,72,2],[10,74,2],[12,76,4]],
  [[0,77,2],[2,79,2],[4,81,3],[8,84,2],[10,81,2],[12,79,4]],
  [[0,74,2],[2,76,2],[4,79,2],[6,76,2],[8,72,5],[14,74,2]]
];
const BASS = [48, 45, 41, 43, 48, 45, 41, 43];   // C3 A2 F2 G2 x2
const PENT = [72, 74, 76, 79, 81, 84, 86, 88];   // star-collect ladder

function musicStep(gs, t) {
  const s = gs % LOOP_STEPS, bar = s >> 4, st = s & 15;
  if (st === 0 || st === 8) kick(t);
  if (st === 4 || st === 12) clap(t);
  if ((st & 1) === 0) hat(t, (st % 4 === 2) ? 0.16 : 0.10);
  if ((bar === 3 || bar === 7) && st >= 13) hat(t, 0.13);          // little fill
  if ((st & 1) === 0) {                                            // bass 8ths
    const r = BASS[bar];
    const p = (st === 6 || st === 14) ? r + 12 : (st === 12 ? r + 7 : r);
    tone(mf(p), t, STEP * 0.9, 'triangle', 0.22, musicG);
  }
  const notes = MEL[bar];
  for (let i = 0; i < notes.length; i++)
    if (notes[i][0] === st)
      tone(mf(notes[i][1]), t, STEP * notes[i][2] * 0.92, 'square', 0.10, melBus);
}

/* sound effects */
function sfxJump(hi) {
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(hi ? 340 : 280, t);
  o.frequency.exponentialRampToValueAtTime(hi ? 760 : 620, t + 0.12);
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  o.connect(g); g.connect(sfxG); o.start(t); o.stop(t + 0.2);
}
function sfxBlip(n) {
  const t = actx.currentTime;
  tone(mf(PENT[n % PENT.length]), t, 0.10, 'square', 0.16, sfxG);
  tone(mf(PENT[n % PENT.length] + 12), t + 0.03, 0.07, 'square', 0.07, sfxG);
}
function sfxBonk() {
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(130, t);
  o.frequency.exponentialRampToValueAtTime(65, t + 0.13);
  g.gain.setValueAtTime(0.28, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
  o.connect(g); g.connect(sfxG); o.start(t); o.stop(t + 0.22);
  noiseHit(t, 0.1, 0.2, 'lowpass', 380, sfxG);
}
function sfxFanfare(t) {
  const arp = [72, 76, 79, 84];
  for (let i = 0; i < arp.length; i++)
    tone(mf(arp[i]), t + i * STEP * 0.5, 0.16, 'square', 0.14, melBus);
}

/* =====================================================================
   BEAT CHART — where grumps and stars live inside each 8-bar loop
   ===================================================================== */
const SLOTS = [                       // obstacle slots unlock by loop count
  { bar: 1, step: 8, min: 0 },
  { bar: 3, step: 8, min: 0 },
  { bar: 5, step: 8, min: 0 },
  { bar: 7, step: 8, min: 0 },
  { bar: 2, step: 0, min: 1 },
  { bar: 6, step: 0, min: 1 },
  { bar: 0, step: 8, min: 2 },
  { bar: 4, step: 8, min: 2 }
];
function barHasObstacle(loop, bar) {
  for (let i = 0; i < SLOTS.length; i++)
    if (SLOTS[i].bar === bar && loop >= SLOTS[i].min) return true;
  return false;
}

/* entities: k=0 star {t,h,got}   k=1 grump {t,hit,done} */
let ents = [], parts = [], texts = [];

function spawnAt(gs, t) {
  if (gs < 8) return;                              // one breath before the fun
  const loop = Math.floor(gs / LOOP_STEPS);
  const s = gs % LOOP_STEPS, bar = s >> 4, st = s & 15;

  let ob = null;
  for (let i = 0; i < SLOTS.length; i++) {
    const o = SLOTS[i];
    if (o.bar === bar && o.step === st && loop >= o.min) { ob = o; break; }
  }
  if (ob) {
    ents.push({ k: 1, t: t, hit: false, done: false });
    for (let o = -2; o <= 2; o++) {                // star arc traces the jump
      const dt = Math.abs(o) * 0.13;
      const h = PR + APEX - 6 - 0.5 * GRAV * dt * dt;
      ents.push({ k: 0, t: t + o * 0.13, h: h, got: false });
    }
  } else if (!barHasObstacle(loop, bar) &&
             (st === 8 || st === 10 || st === 12 || st === 14)) {
    ents.push({ k: 0, t: t, h: PR + 34, got: false });   // easy ground stars
  }
}

/* =====================================================================
   SCHEDULER — two look-ahead pointers on one interval
   (notes ~160 ms ahead; spawns far enough ahead to enter from the right)
   ===================================================================== */
let noteStep = 0, spawnStep = 0, songStart = 0, schedTimer = null;

function scheduler() {
  if (!running || paused) return;
  const t = actx.currentTime;
  while (songStart + noteStep * STEP < t + 0.16) {
    musicStep(noteStep, songStart + noteStep * STEP);
    noteStep++;
  }
  while (songStart + spawnStep * STEP < t + spawnHorizon) {
    spawnAt(spawnStep, songStart + spawnStep * STEP);
    spawnStep++;
  }
}

/* =====================================================================
   GAME STATE
   ===================================================================== */
const player = { hgt: 0, vy: 0, jumps: 0, buffer: 0 };
let running = false, paused = false;
let score = 0, combo = 0, inv = 0, shake = 0;
let lastLoop = 0, uiClock = 0, muted = false;
const WORDS = ['AWESOME!', 'GREAT JOB!', 'SUPER!', 'WOW!', 'FANTASTIC!'];

function resetGame() {
  ents = []; parts = []; texts = [];
  score = 0; combo = 0; inv = 0; shake = 0; lastLoop = 0;
  player.hgt = 0; player.vy = 0; player.jumps = 0; player.buffer = 0;
  noteStep = 0; spawnStep = 0;
  songStart = actx.currentTime + 0.35;
  bigText('HERE WE GO!');
}

function startGame() {
  initAudio();
  if (actx.state !== 'running') actx.resume();
  running = true; paused = false;
  resetGame();
  splash.hidden = true;
  pauseBtn.hidden = false;
  if (!schedTimer) schedTimer = setInterval(scheduler, 30);
}

function doPause() {
  if (!running || paused) return;
  paused = true;
  actx.suspend();
  menu.hidden = false;
  pauseBtn.hidden = true;
}
function doResume() {
  paused = false;
  actx.resume();
  menu.hidden = true;
  pauseBtn.hidden = false;
}

/* ---------------- input ---------------- */
function jump() {
  if (player.hgt <= 0.5) {
    player.vy = JV; player.jumps = 1; player.buffer = 0;
    sfxJump(false); puff(PX, groundY, 6);
  } else if (player.jumps < 2) {
    player.vy = JV * 0.9; player.jumps = 2;
    sfxJump(true); puff(PX, groundY - player.hgt, 4);
  } else {
    player.buffer = 0.12;                    // buffered tap lands -> auto jump
  }
}

window.addEventListener('pointerdown', function (e) {
  if (!menu.hidden) return;
  if (actx && actx.state !== 'running' && running && !paused) actx.resume();
  if (!running) { startGame(); return; }
  if (!paused) jump();
});
window.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!running) { startGame(); return; }
    if (!paused && menu.hidden) jump();
  }
});
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
document.addEventListener('visibilitychange', function () {
  if (document.hidden) doPause();
});

/* menu buttons */
const splash   = document.getElementById('splash');
const menu     = document.getElementById('menu');
const pauseBtn = document.getElementById('pauseBtn');
const soundB   = document.getElementById('soundB');

pauseBtn.addEventListener('pointerdown', function (e) { e.stopPropagation(); doPause(); });
document.getElementById('resumeB').addEventListener('pointerdown', function (e) { e.stopPropagation(); doResume(); });
document.getElementById('restartB').addEventListener('pointerdown', function (e) {
  e.stopPropagation();
  doResume(); resetGame();
});
soundB.addEventListener('pointerdown', function (e) {
  e.stopPropagation();
  muted = !muted;
  master.gain.value = muted ? 0 : 0.9;
  soundB.innerHTML = muted ? '&#128263; Sound is off' : '&#128266; Sound is on';
});

/* =====================================================================
   PARTICLES & FLOATY TEXT
   ===================================================================== */
function puff(x, y, n) {
  for (let i = 0; i < n; i++)
    parts.push({ c: 0, x: x + (Math.random() - 0.5) * 26, y: y - 4,
                 vx: (Math.random() - 0.5) * 90, vy: -Math.random() * 70,
                 r: 3 + Math.random() * 4, life: 0.45, max: 0.45, col: '#ffffff' });
}
function sparkle(x, y, col) {
  for (let i = 0; i < 7; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 130;
    parts.push({ c: 0, x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
                 r: 2.5 + Math.random() * 3, life: 0.55, max: 0.55, col: col });
  }
}
function confetti() {
  for (let i = 0; i < 90; i++)
    parts.push({ c: 1, x: Math.random() * W, y: -20 - Math.random() * 100,
                 vx: (Math.random() - 0.5) * 120, vy: 90 + Math.random() * 170,
                 w: 6 + Math.random() * 6, rot: Math.random() * 6.28,
                 vr: (Math.random() - 0.5) * 10, life: 3.2, max: 3.2,
                 col: 'hsl(' + ((Math.random() * 360) | 0) + ',90%,60%)' });
}
function bigText(str) { texts.push({ str: str, t0: uiClock }); }

/* =====================================================================
   PRE-RENDERED SPRITES (no per-frame shadowBlur — iPad friendly)
   ===================================================================== */
function makeSprite(size, fn) {
  const c = document.createElement('canvas');
  c.width = c.height = size * 2;                 // 2x for crispness
  const g = c.getContext('2d');
  g.scale(2, 2); fn(g, size);
  return c;
}
function rr(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
const starSpr = makeSprite(40, function (g, s) {
  const cx = s / 2, cy = s / 2;
  const glow = g.createRadialGradient(cx, cy, 2, cx, cy, s / 2);
  glow.addColorStop(0, 'rgba(255,240,150,0.9)');
  glow.addColorStop(1, 'rgba(255,240,150,0)');
  g.fillStyle = glow; g.fillRect(0, 0, s, s);
  g.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = (i % 2 === 0) ? s * 0.34 : s * 0.15;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
  }
  g.closePath();
  g.fillStyle = '#FFD84D'; g.fill();
  g.lineWidth = 2.5; g.strokeStyle = '#ffffff'; g.stroke();
  g.fillStyle = 'rgba(255,255,255,0.9)';
  g.beginPath(); g.arc(cx - 3, cy - 4, 2.4, 0, 7); g.fill();
});
const grumpSpr = makeSprite(56, function (g, s) {
  g.translate(s / 2, s);
  g.fillStyle = '#7A5CC0';
  g.beginPath(); g.arc(-13, -s + 12, 6, 0, 7); g.fill();
  g.beginPath(); g.arc(0,  -s + 9,  6, 0, 7); g.fill();
  g.beginPath(); g.arc(13, -s + 12, 6, 0, 7); g.fill();
  const grd = g.createLinearGradient(0, -s, 0, 0);
  grd.addColorStop(0, '#A98BE0'); grd.addColorStop(1, '#8A67CE');
  g.fillStyle = grd;
  rr(g, -s * 0.4, -s + 12, s * 0.8, s - 12, 14); g.fill();
  g.fillStyle = '#6E4FB5';
  g.beginPath(); g.arc(-11, -3, 7, 0, 7); g.fill();
  g.beginPath(); g.arc(11, -3, 7, 0, 7); g.fill();
  g.strokeStyle = '#3E2E66'; g.lineWidth = 3; g.lineCap = 'round';
  g.beginPath(); g.arc(-9, -s + 26, 5, Math.PI * 0.15, Math.PI * 0.85); g.stroke();
  g.beginPath(); g.arc(9,  -s + 26, 5, Math.PI * 0.15, Math.PI * 0.85); g.stroke();
  g.beginPath(); g.arc(0,  -s + 44, 6, Math.PI * 1.15, Math.PI * 1.85); g.stroke();
  g.fillStyle = 'rgba(255,120,150,0.4)';
  g.beginPath(); g.arc(-14, -s + 33, 4, 0, 7); g.fill();
  g.beginPath(); g.arc(14, -s + 33, 4, 0, 7); g.fill();
});
const cloudSpr = makeSprite(120, function (g, s) {
  g.fillStyle = 'rgba(255,255,255,0.95)';
  g.beginPath(); g.arc(s * 0.3, s * 0.62, s * 0.20, 0, 7); g.fill();
  g.beginPath(); g.arc(s * 0.52, s * 0.5, s * 0.26, 0, 7); g.fill();
  g.beginPath(); g.arc(s * 0.74, s * 0.62, s * 0.19, 0, 7); g.fill();
  g.fillRect(s * 0.28, s * 0.6, s * 0.48, s * 0.2);
});

const CLOUDS = [];
for (let i = 0; i < 5; i++)
  CLOUDS.push({ yf: 0.08 + Math.random() * 0.22, s: 0.7 + Math.random() * 0.9,
                off: Math.random() * 3000 });

/* =====================================================================
   UPDATE
   ===================================================================== */
let prevMs = performance.now();

function update(dt, now) {
  uiClock += dt;

  /* player physics */
  if (player.hgt > 0 || player.vy > 0) {
    player.vy  -= GRAV * dt;
    player.hgt += player.vy * dt;
    if (player.hgt <= 0) {
      player.hgt = 0; player.vy = 0; player.jumps = 0;
      puff(PX, groundY, 4);
      if (player.buffer > 0) { player.buffer = 0; jump(); }
    }
  }
  if (player.buffer > 0) player.buffer -= dt;
  if (inv > 0) inv -= dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 2.5);

  /* entities: collide + cull */
  const pcy = player.hgt + PR;                       // player centre, above ground
  for (let i = ents.length - 1; i >= 0; i--) {
    const e = ents[i];
    const ex = PX + SPEED * (e.t - now);
    if (ex < -120) { ents.splice(i, 1); continue; }

    if (e.k === 0 && !e.got) {
      const dx = ex - PX, dy = e.h - pcy;
      if (dx * dx + dy * dy < 48 * 48) {
        e.got = true; score++; combo++;
        sfxBlip(combo - 1);
        sparkle(ex, groundY - e.h, '#FFD84D');
      }
    } else if (e.k === 1) {
      if (!e.hit && inv <= 0) {
        const dxo = Math.max(Math.abs(ex - PX) - 18, 0);
        const dyo = Math.max(pcy - 52, 0);
        if (dxo * dxo + dyo * dyo < PR * PR * 0.8) {
          e.hit = true; inv = 1.3; shake = 1; combo = 0;
          sfxBonk();
          sparkle(PX, groundY - pcy, '#A98BE0');
        }
      }
      if (!e.done && ex < PX - 60) {
        e.done = true;
        if (!e.hit) sparkle(ex, groundY - 70, '#9BE79B');
      }
    }
  }

  /* particles */
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dt;
    if (p.life <= 0) { parts.splice(i, 1); continue; }
    if (p.c === 1) {                                  // confetti
      p.vy += 420 * dt;
      p.x += p.vx * dt + Math.sin(p.life * 7) * 26 * dt;
      p.y += p.vy * dt;
      p.rot += p.vr * dt;
    } else {
      p.vy += 300 * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
    }
  }

  /* floaty text lifetime */
  for (let i = texts.length - 1; i >= 0; i--)
    if (uiClock - texts[i].t0 > 1.6) texts.splice(i, 1);

  /* loop celebration */
  if (now > songStart) {
    const lp = Math.floor((now - songStart) / LOOP_DUR);
    if (lp > lastLoop) {
      lastLoop = lp;
      confetti();
      bigText(WORDS[(lp - 1) % WORDS.length]);
      sfxFanfare(actx.currentTime + 0.03);
    }
  }
}

/* =====================================================================
   RENDER
   ===================================================================== */
function draw(now) {
  const beats = Math.max(0, (now - songStart) / BEAT);
  const pulse = (now > songStart) ? Math.max(0, 1 - (beats % 1) * 3.2) : 0;
  const scroll = Math.max(0, now - songStart) * SPEED;

  ctx.save();
  if (shake > 0)
    ctx.translate((Math.random() - 0.5) * 7 * shake, (Math.random() - 0.5) * 5 * shake);

  /* sky */
  const sky = ctx.createLinearGradient(0, 0, 0, groundY);
  sky.addColorStop(0, '#79dcf5');
  sky.addColorStop(0.65, '#aeeef8');
  sky.addColorStop(1, '#ffe7c4');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, groundY);

  /* sun with beat ring */
  const sx = W * 0.82, sy = H * 0.18;
  ctx.fillStyle = '#FFD66B';
  ctx.beginPath(); ctx.arc(sx, sy, 34, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(255,214,107,' + (0.55 * pulse) + ')';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(sx, sy, 42 + 14 * (1 - pulse), 0, 7); ctx.stroke();

  /* clouds */
  for (let i = 0; i < CLOUDS.length; i++) {
    const c = CLOUDS[i];
    const span = W + 320;
    const x = span - ((scroll * 0.12 + c.off) % span) - 160;
    ctx.drawImage(cloudSpr, x, H * c.yf, 120 * c.s, 120 * c.s * 0.55);
  }

  /* rolling hills, two parallax layers */
  hills(scroll, groundY - 60, 26, 210, 0.35, '#9adfb0');
  hills(scroll, groundY - 22, 34, 150, 0.6,  '#6fce8b');

  /* ground: dirt, grass, beat tiles */
  ctx.fillStyle = '#C98A5B';
  ctx.fillRect(0, groundY, W, H - groundY);
  const tileW = SPEED * BEAT;
  const off = scroll % (tileW * 2);
  for (let x = -off; x < W; x += tileW) {
    const idx = Math.round((x + scroll) / tileW);
    ctx.fillStyle = (idx & 1) ? '#5CC974' : '#6AD683';
    ctx.fillRect(x, groundY, tileW + 1, 26);
  }
  if (pulse > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.20 * pulse) + ')';
    ctx.fillRect(0, groundY, W, 26);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, groundY + 26, W, 4);

  /* entities */
  for (let i = 0; i < ents.length; i++) {
    const e = ents[i];
    const ex = PX + SPEED * (e.t - now);
    if (ex > W + 120) continue;
    if (e.k === 0) {
      if (e.got) continue;
      const wob = Math.sin(now * 3 + e.t * 5) * 3;
      const sz = 40;
      ctx.drawImage(starSpr, ex - sz / 2, groundY - e.h - sz / 2 + wob, sz, sz);
    } else {
      const sq = e.hit ? 0.8 : 1 + Math.sin(now * 4 + e.t) * 0.03;
      const w0 = 52, h0 = 60 * sq;
      ctx.drawImage(grumpSpr, ex - w0 / 2, groundY - h0, w0, h0);
    }
  }

  drawDino(now, beats);

  /* particles */
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    const a = Math.max(0, p.life / p.max);
    if (p.c === 1) {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = Math.min(1, a * 2);
      ctx.fillStyle = p.col;
      ctx.fillRect(-p.w / 2, -p.w / 3, p.w, p.w * 0.66);
      ctx.restore();
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a + 1, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  /* floaty words */
  for (let i = 0; i < texts.length; i++) {
    const tx = texts[i];
    const age = uiClock - tx.t0;
    const s = age < 0.25 ? backOut(age / 0.25) : 1;
    const a = age > 1.15 ? Math.max(0, 1 - (age - 1.15) / 0.45) : 1;
    ctx.save();
    ctx.translate(W / 2, H * 0.3);
    ctx.scale(s, s);
    ctx.globalAlpha = a;
    ctx.font = '900 ' + Math.min(64, W * 0.09) + 'px -apple-system, "Segoe UI", Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.strokeText(tx.str, 0, 0);
    ctx.fillStyle = '#FF7043';
    ctx.fillText(tx.str, 0, 0);
    ctx.restore();
  }

  /* HUD */
  if (running) {
    const hy = 16;
    ctx.drawImage(starSpr, 16, hy, 36, 36);
    ctx.font = '900 30px -apple-system, "Segoe UI", Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.strokeText('' + score, 60, hy + 20);
    ctx.fillStyle = '#2c5a6b';
    ctx.fillText('' + score, 60, hy + 20);
  }
  ctx.restore();
}

function hills(scroll, base, amp, wl, par, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, groundY + 2);
  for (let x = 0; x <= W + 24; x += 24) {
    const px2 = x + scroll * par;
    const y = base + Math.sin(px2 / wl) * amp + Math.sin(px2 / (wl * 0.53)) * amp * 0.4;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, groundY + 2);
  ctx.closePath(); ctx.fill();
}

function drawDino(now, beats) {
  const by = groundY - player.hgt;
  const grounded = player.hgt <= 0.5;
  const hop = grounded ? Math.abs(Math.sin(beats * Math.PI)) * 5 : 0;
  const stretch = grounded
    ? 1 + Math.sin(beats * Math.PI * 2) * 0.02
    : Math.max(0.86, Math.min(1.16, 1 + player.vy / 2800));

  ctx.save();
  ctx.translate(PX, by - hop);
  if (inv > 0 && (Math.floor(uiClock * 14) & 1)) ctx.globalAlpha = 0.45;

  /* tail */
  ctx.fillStyle = '#4a90e8';
  ctx.beginPath();
  ctx.moveTo(-24, -22); ctx.lineTo(-46, -10); ctx.lineTo(-24, -8);
  ctx.closePath(); ctx.fill();

  /* legs, trotting on half-beats */
  const lp2 = grounded ? Math.sin(beats * Math.PI * 2) : 0.6;
  ctx.fillStyle = '#3f7fd0';
  ctx.beginPath(); ctx.ellipse(-11, -6 + lp2 * 3, 8, 7, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -6 - lp2 * 3, 8, 7, 0, 0, 7); ctx.fill();

  /* body (squash & stretch) */
  ctx.scale(2 - stretch, stretch);
  ctx.fillStyle = '#58A6FF';
  rr(ctx, -26, -60, 52, 54, 22); ctx.fill();
  ctx.beginPath(); ctx.arc(14, -56, 18, 0, 7); ctx.fill();
  ctx.fillStyle = '#EAF6FF';
  rr(ctx, -16, -40, 30, 32, 14); ctx.fill();

  /* back spikes */
  ctx.fillStyle = '#FFD66B';
  for (let i = 0; i < 3; i++) {
    const bx = -20 + i * 12;
    ctx.beginPath();
    ctx.moveTo(bx, -58); ctx.lineTo(bx + 6, -68); ctx.lineTo(bx + 12, -58);
    ctx.closePath(); ctx.fill();
  }

  /* face */
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(19, -60, 8, 0, 7); ctx.fill();
  ctx.fillStyle = '#1e3a5f';
  ctx.beginPath(); ctx.arc(21.5, -60, 3.6, 0, 7); ctx.fill();
  ctx.strokeStyle = '#1e3a5f'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(24, -50, 5, Math.PI * 0.1, Math.PI * 0.7); ctx.stroke();
  ctx.fillStyle = 'rgba(255,120,150,0.45)';
  ctx.beginPath(); ctx.arc(12, -48, 4, 0, 7); ctx.fill();

  ctx.restore();
}

function backOut(x) { const c = 1.7; return 1 + (c + 1) * Math.pow(x - 1, 3) + c * Math.pow(x - 1, 2); }

/* =====================================================================
   MAIN LOOP — idle scene behind the splash, live game once started
   ===================================================================== */
function frame(ms) {
  const dt = Math.min(0.033, (ms - prevMs) / 1000);
  prevMs = ms;

  if (running && !paused && actx) {
    const now = actx.currentTime;
    update(dt, now);
    draw(now);
  } else if (!running) {
    songStart = 0;
    draw(ms / 1000 * 0.35);          // slow scenic drift under the splash
  }
  requestAnimationFrame(frame);
}

/* splash title, candy-coloured bouncing letters */
(function buildTitle() {
  const ttl = document.getElementById('ttl');
  const cols = ['#FF7043', '#FFB300', '#62CE7A', '#58A6FF', '#A98BE0', '#FF6FA5'];
  const words = ['RHYTHM', 'RUNNER'];
  let k = 0;
  for (let w = 0; w < words.length; w++) {
    for (let i = 0; i < words[w].length; i++) {
      const sp = document.createElement('span');
      sp.textContent = words[w][i];
      sp.style.color = cols[k % cols.length];
      sp.style.animationDelay = (k * 0.07) + 's';
      ttl.appendChild(sp);
      k++;
    }
    if (w === 0) ttl.appendChild(document.createElement('br'));
  }
})();

requestAnimationFrame(frame);
</script>
</body>
